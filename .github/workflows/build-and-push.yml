name: Сборка и публикация Docker-образов

on:
  push:
    branches:
      - review-3 # Временно до проведения ревью
      - main # Запускается при каждом пуше в ветку main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

# ============================================================
# Задания (jobs)
# ============================================================
jobs:
  build-backend:
    name: Сборка образа бэкенда
    runs-on: ubuntu-latest

    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Настроить Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Авторизоваться в GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Собрать и опубликовать образ бэкенда
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/film-nest-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/film-nest-backend:${{ github.sha }}
          # Использовать кэш GitHub Actions для ускорения повторных сборок
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Сборка образа фронтенда
    runs-on: ubuntu-latest

    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Настроить Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Авторизоваться в GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Собрать и опубликовать образ фронтенда
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/film-react-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/film-react-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
